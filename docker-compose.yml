services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: micro_triggers
      POSTGRES_PASSWORD: micro_triggers_dev
      POSTGRES_DB: micro_triggers_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
