# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "4b12238f93b1314ef87d1bf68c4130ca"
application_url = "https://micro-triggers-production.up.railway.app1"
embedded = true
name = "micro-triggers"
handle = "micro-triggers"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
# write_app_proxy — обязателен для App Proxy (шаг 3: сторфронт получает настройки
# триггеров через /apps/micro-triggers/settings). Admin GraphQL API не используется:
# настройки хранятся в своей БД, Billing API (appSubscriptionCreate) не требует
# доп. scopes.
scopes = "write_app_proxy"

[app_proxy]
url = "https://micro-triggers-production.up.railway.app1/proxy"
prefix = "apps"
subpath = "micro-triggers"

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

[auth]
redirect_urls = [ "https://micro-triggers-production.up.railway.app1/api/auth" ]

[build]
automatically_update_urls_on_dev = true
